<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{display:block}</style></head><body>
<canvas id="c" width="960" height="540"></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=960,H=540;
const FPS=30,DUR=8,TOT=FPS*DUR;
let f=0;
const O='#F5821F',T='#00D4FF',G='#25D366',N='#050b18';
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function easeOut(t){return 1-Math.pow(clamp(t,0,1)-1,3)}
function fade(t,s,e){return easeOut(clamp((t-s)/(e-s),0,1))}
function glow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b}
function noGlow(){ctx.shadowBlur=0;ctx.shadowColor='transparent'}
function txt(s,x,y,sz,c,a='center',w='900'){ctx.font=`${w} ${sz}px Inter,Arial Black,sans-serif`;ctx.fillStyle=c;ctx.textAlign=a;ctx.fillText(s,x,y)}

// Rack unit
function drawRackUnit(x,y,w,h,lit,alpha){
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#0a1628';ctx.strokeStyle='rgba(0,212,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();ctx.stroke();
  // LEDs
  for(let i=0;i<4;i++){
    ctx.fillStyle=lit?T:'#1a2a40';
    if(lit)glow(T,6);
    ctx.beginPath();ctx.arc(x+8+i*10,y+h/2,3,0,Math.PI*2);ctx.fill();
    noGlow();
  }
  // Bar lines
  ctx.fillStyle='rgba(0,212,255,0.06)';ctx.fillRect(x+40,y+4,w-48,h-8);
  ctx.globalAlpha=1;
}
function drawRack(x,y,rackW,rackH,fillPct,alpha){
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#060e1e';ctx.strokeStyle='rgba(0,212,255,0.4)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(x,y,rackW,rackH,8);ctx.fill();ctx.stroke();
  ctx.globalAlpha=1;
  const unitH=18,gap=4,units=Math.floor(rackH/(unitH+gap));
  const litUnits=Math.round(units*fillPct);
  for(let i=0;i<units;i++){
    const ua=easeOut(clamp((fillPct*units-i)/.5,0,1));
    drawRackUnit(x+8,y+10+i*(unitH+gap),rackW-16,unitH,i<litUnits,alpha*ua);
  }
  // Wheels
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#1a2a3a';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(x+rackW/2+s*30,y+rackH+8,10,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}
function drawCoin(x,y,val,alpha){
  ctx.globalAlpha=alpha;
  glow(O,15);ctx.fillStyle='rgba(245,130,31,0.15)';ctx.strokeStyle=O;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();ctx.stroke();
  noGlow();ctx.fillStyle=O;ctx.font='700 11px Arial';ctx.textAlign='center';ctx.fillText('EGP',x,y+4);
  ctx.globalAlpha=1;
}

function draw(){
  const t=f/FPS;
  
  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#030810');bg.addColorStop(1,'#000');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  
  // Grid
  ctx.strokeStyle='rgba(0,212,255,0.05)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // PHASE 1 (0-2s): The CAPEX Problem
  if(t<3){
    const p=fade(t,0,.4);
    ctx.globalAlpha=p;txt('THE PROBLEM WITH IT INFRASTRUCTURE',W/2,80,14,T,'center','600');ctx.globalAlpha=1;
    // CAPEX label
    const ca=fade(t,.2,1);
    glow('#ff4444',20);ctx.globalAlpha=ca;txt('MASSIVE UPFRONT COST',W/2,H/2-50,36,'#FF4444');noGlow();
    ctx.globalAlpha=ca*.8;txt('Servers  +  Licenses  +  Setup  +  Staff',W/2,H/2+10,18,'#888');ctx.globalAlpha=1;
    // Falling coins
    const coinCount=Math.floor(fade(t,.5,2)*12);
    for(let i=0;i<coinCount;i++){
      const cx=(i%6)*(W/6)+W/12,cy=H/2+80+Math.sin(t*2+i)*.8*20;
      drawCoin(cx,cy,1,fade(t,.5+i*.1,1+i*.1));
    }
    const totalA=fade(t,1.5,2.3);
    ctx.globalAlpha=totalA;
    ctx.fillStyle='rgba(255,68,68,0.08)';ctx.beginPath();ctx.roundRect(W/2-150,H-120,300,52,10);ctx.fill();
    glow('#FF4444',15);txt('250,000+ EGP UPFRONT',W/2,H-88,22,'#FF4444');noGlow();ctx.globalAlpha=1;
  }

  // PHASE 2 (2-4s): Zero CAPEX reveal
  if(t>2){
    const p=fade(t,2,3);
    // Wipe
    const wipe=(1-fade(t,2,2.8))*W;
    ctx.fillStyle=`rgba(3,8,16,${p})`;ctx.fillRect(0,0,wipe,H);
    // ZERO text
    ctx.globalAlpha=p;
    const gr=ctx.createLinearGradient(W/2-200,0,W/2+200,0);gr.addColorStop(0,T);gr.addColorStop(1,O);
    ctx.fillStyle=gr;ctx.font='900 100px Inter,Arial Black,sans-serif';ctx.textAlign='center';ctx.fillText('ZERO',W/2,H/2-30);
    glow(T,30);txt('CAPEX',W/2,H/2+60,52,T);noGlow();
    ctx.globalAlpha=p*.7;txt('No upfront hardware. No software licenses. No setup costs.',W/2,H/2+110,15,'#aaa');ctx.globalAlpha=1;
  }

  // PHASE 3 (3.5-6s): Rack building up
  if(t>3.5){
    const p=fade(t,3.5,4.2);
    // Clear center
    ctx.fillStyle=`rgba(3,8,16,${p*.9})`;ctx.fillRect(W/2-250,50,500,H-100);
    // Rack grows
    const rackFill=fade(t,4,5.5);
    drawRack(W/2-70,70,140,360,rackFill,p);
    // Labels appearing
    const items=[
      ['⚙  HARDWARE','Full enterprise-grade servers'],
      ['💾  SOFTWARE','All licenses pre-configured'],
      ['🔧  SUPPORT','24/7 expert team on standby'],
    ];
    items.forEach(([title,sub],i)=>{
      const ia=fade(t,4.5+i*.4,5+i*.4);
      ctx.globalAlpha=ia;
      ctx.fillStyle='rgba(0,212,255,0.07)';ctx.beginPath();ctx.roundRect(W/2+90,150+i*90,230,70,10);ctx.fill();
      glow(T,5);txt(title,W/2+205,183+i*90,13,T,'center','700');noGlow();
      txt(sub,W/2+205,202+i*90,11,'#778','center','400');
      ctx.globalAlpha=1;
      // Left side mirror
      ctx.globalAlpha=ia*.8;
      ctx.fillStyle='rgba(245,130,31,0.06)';ctx.beginPath();ctx.roundRect(W/2-320,150+i*90,220,70,10);ctx.fill();
      ctx.globalAlpha=1;
    });
    // Arrow to rack
    const aa=fade(t,5,5.5);
    ctx.globalAlpha=aa;ctx.strokeStyle=T;ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(W/2+90,185);ctx.lineTo(W/2+80,185);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W/2+90,275);ctx.lineTo(W/2+80,275);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W/2+90,365);ctx.lineTo(W/2+80,365);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }

  // PHASE 4 (5.8-8s): Monthly rental CTA
  if(t>5.8){
    const p=fade(t,5.8,6.5);
    ctx.fillStyle=`rgba(3,8,16,${p*.9})`;ctx.fillRect(0,H-200,W,200);
    ctx.globalAlpha=p;
    glow(G,20);txt('ONE MONTHLY RENTAL FEE',W/2,H-148,28,G);noGlow();
    txt('Everything included. Deploy in 24 hours.',W/2,H-108,16,'#aaa','center','500');
    // Price tag style
    const pa=fade(t,6.5,7);
    ctx.globalAlpha=pa;
    const g2=ctx.createLinearGradient(W/2-160,0,W/2+160,0);g2.addColorStop(0,O);g2.addColorStop(1,'#f5a033');
    ctx.fillStyle=g2;ctx.beginPath();ctx.roundRect(W/2-160,H-90,320,52,26);ctx.fill();
    glow('#fff',10);txt('Contact AGS Today →  wa.me/201002194451',W/2,H-58,14,'#fff');noGlow();
    ctx.globalAlpha=1;
  }
  
  ctx.fillStyle='rgba(0,0,0,0.03)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  f++;
}
function loop(){draw();if(f<=TOT+10)requestAnimationFrame(loop);}
loop();
</script></body></html>
